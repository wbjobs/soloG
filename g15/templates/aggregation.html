<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚合分析 - 实时日志分析平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="aggregationPage()">
    <div class="flex h-screen">
        <div class="w-64 bg-gray-800 p-4 flex flex-col border-r border-gray-700">
            <h1 class="text-xl font-bold text-blue-400 mb-6">📊 日志分析平台</h1>
            <nav class="space-y-2">
                <a href="/" class="block px-4 py-2 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    📋 仪表盘
                </a>
                <a href="/alerts" class="block px-4 py-2 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors">
                    🔔 告警管理
                </a>
                <a href="/aggregation" class="block px-4 py-2 rounded-lg bg-blue-600 text-white">
                    📈 聚合分析
                </a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-semibold">Top N 聚合分析</h2>
                <div class="flex gap-2">
                    <select x-model="timeRange" @change="loadAllData()" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="15">最近15分钟</option>
                        <option value="60" selected>最近1小时</option>
                        <option value="360">最近6小时</option>
                        <option value="1440">最近24小时</option>
                        <option value="10080">最近7天</option>
                    </select>
                    <select x-model="topN" @change="loadAllData()" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="5">Top 5</option>
                        <option value="10" selected>Top 10</option>
                        <option value="20">Top 20</option>
                        <option value="50">Top 50</option>
                    </select>
                    <button @click="loadAllData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm transition-colors">
                        🔄 刷新
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto p-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-800 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">🏷️ 日志来源 Top</h3>
                        <div id="sourceChart" class="h-64"></div>
                        <div class="mt-3 max-h-48 overflow-y-auto space-y-1">
                            <template x-for="(item, index) in sourceData" :key="item.value">
                                <div class="flex items-center text-sm">
                                    <span class="w-6 text-gray-500" x-text="index + 1"></span>
                                    <span class="flex-1 truncate" x-text="item.value"></span>
                                    <span class="text-blue-400 font-mono" x-text="item.count.toLocaleString()"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="bg-gray-800 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">🖥️ 主机名 Top</h3>
                        <div id="hostnameChart" class="h-64"></div>
                        <div class="mt-3 max-h-48 overflow-y-auto space-y-1">
                            <template x-for="(item, index) in hostnameData" :key="item.value">
                                <div class="flex items-center text-sm">
                                    <span class="w-6 text-gray-500" x-text="index + 1"></span>
                                    <span class="flex-1 truncate" x-text="item.value"></span>
                                    <span class="text-green-400 font-mono" x-text="item.count.toLocaleString()"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="bg-gray-800 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">🔴 日志级别分布</h3>
                        <div id="severityChart" class="h-64"></div>
                        <div class="mt-3 max-h-48 overflow-y-auto space-y-1">
                            <template x-for="(item, index) in severityData" :key="item.value">
                                <div class="flex items-center text-sm">
                                    <span class="w-6 text-gray-500" x-text="index + 1"></span>
                                    <span class="flex-1">
                                        <span class="px-2 py-0.5 rounded text-xs mr-2" :class="getSeverityClass(item.value)" x-text="item.severity_name"></span>
                                    </span>
                                    <span class="text-red-400 font-mono" x-text="item.count.toLocaleString()"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="bg-gray-800 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">🏷️ 标签 Top</h3>
                        <div id="tagChart" class="h-64"></div>
                        <div class="mt-3 max-h-48 overflow-y-auto space-y-1">
                            <template x-for="(item, index) in tagData" :key="item.value">
                                <div class="flex items-center text-sm">
                                    <span class="w-6 text-gray-500" x-text="index + 1"></span>
                                    <span class="flex-1 truncate">
                                        <span class="px-2 py-0.5 bg-purple-900 text-purple-300 rounded text-xs" x-text="item.value"></span>
                                    </span>
                                    <span class="text-purple-400 font-mono" x-text="item.count.toLocaleString()"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="mt-4 bg-gray-800 rounded-lg p-4">
                    <h3 class="font-semibold mb-3">📊 时间趋势 (最近24小时，按小时)</h3>
                    <div id="timeTrendChart" class="h-80"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function aggregationPage() {
            return {
                timeRange: '60',
                topN: '10',
                sourceData: [],
                hostnameData: [],
                severityData: [],
                tagData: [],
                charts: {},

                init() {
                    this.initCharts();
                    this.loadAllData();
                    setInterval(() => this.loadAllData(), 60000);
                },

                initCharts() {
                    this.charts.source = echarts.init(document.getElementById('sourceChart'));
                    this.charts.hostname = echarts.init(document.getElementById('hostnameChart'));
                    this.charts.severity = echarts.init(document.getElementById('severityChart'));
                    this.charts.tag = echarts.init(document.getElementById('tagChart'));
                    this.charts.timeTrend = echarts.init(document.getElementById('timeTrendChart'));

                    window.addEventListener('resize', () => {
                        Object.values(this.charts).forEach(c => c.resize());
                    });
                },

                getTimeRange() {
                    const now = new Date();
                    const minutes = parseInt(this.timeRange);
                    const start = new Date(now.getTime() - minutes * 60 * 1000);
                    return {
                        start_time: start.toISOString().replace('T', ' ').substring(0, 19),
                        end_time: now.toISOString().replace('T', ' ').substring(0, 19),
                    };
                },

                async loadAllData() {
                    const { start_time, end_time } = this.getTimeRange();
                    const limit = parseInt(this.topN);

                    try {
                        const [sourceRes, hostnameRes, severityRes, tagRes, timeRes] = await Promise.all([
                            fetch(`/api/v1/logs/topn?field=source&limit=${limit}&start_time=${start_time}&end_time=${end_time}`),
                            fetch(`/api/v1/logs/topn?field=hostname&limit=${limit}&start_time=${start_time}&end_time=${end_time}`),
                            fetch(`/api/v1/logs/topn?field=severity&limit=${limit}&start_time=${start_time}&end_time=${end_time}`),
                            fetch(`/api/v1/logs/topn?field=tag&limit=${limit}&start_time=${start_time}&end_time=${end_time}`),
                            fetch(`/api/v1/logs/aggregate?field=time&limit=1440&start_time=${start_time}&end_time=${end_time}`)
                        ]);

                        const sourceData = await sourceRes.json();
                        const hostnameData = await hostnameRes.json();
                        const severityData = await severityRes.json();
                        const tagData = await tagRes.json();
                        const timeData = await timeRes.json();

                        this.sourceData = sourceData.data || [];
                        this.hostnameData = hostnameData.data || [];
                        this.severityData = severityData.data || [];
                        this.tagData = tagData.data || [];

                        this.updateBarChart('source', this.sourceData, '#3b82f6', 'source');
                        this.updateBarChart('hostname', this.hostnameData, '#10b981', 'hostname');
                        this.updateBarChart('tag', this.tagData, '#8b5cf6', 'tag');
                        this.updateSeverityChart(this.severityData);
                        this.updateTimeTrendChart(timeData.data || []);
                    } catch (e) {
                        console.error('Failed to load data:', e);
                    }
                },

                updateBarChart(chartId, data, color, field) {
                    const sorted = data.slice().sort((a, b) => b.count - a.count);
                    this.charts[chartId].setOption({
                        backgroundColor: 'transparent',
                        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                        xAxis: {
                            type: 'value',
                            axisLine: { lineStyle: { color: '#4b5563' } },
                            axisLabel: { color: '#9ca3af', fontSize: 10 },
                            splitLine: { lineStyle: { color: '#374151' } }
                        },
                        yAxis: {
                            type: 'category',
                            data: sorted.map(d => d.value).reverse(),
                            axisLine: { lineStyle: { color: '#4b5563' } },
                            axisLabel: { color: '#9ca3af', fontSize: 10 }
                        },
                        series: [{
                            type: 'bar',
                            data: sorted.map(d => d.count).reverse(),
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                    { offset: 0, color: color },
                                    { offset: 1, color: color + '88' }
                                ]),
                                borderRadius: [0, 4, 4, 0]
                            }
                        }]
                    });
                },

                updateSeverityChart(data) {
                    const colors = {
                        0: '#7f1d1d', 1: '#991b1b', 2: '#b91c1c', 3: '#dc2626',
                        4: '#d97706', 5: '#2563eb', 6: '#059669', 7: '#6b7280'
                    };
                    this.charts.severity.setOption({
                        backgroundColor: 'transparent',
                        tooltip: { trigger: 'item' },
                        legend: {
                            orient: 'vertical',
                            right: 10,
                            top: 'center',
                            textStyle: { color: '#9ca3af', fontSize: 11 }
                        },
                        series: [{
                            type: 'pie',
                            radius: ['40%', '70%'],
                            center: ['35%', '50%'],
                            avoidLabelOverlap: false,
                            itemStyle: { borderRadius: 4, borderColor: '#1f2937', borderWidth: 2 },
                            label: { show: false },
                            emphasis: {
                                label: { show: true, fontSize: 12, fontWeight: 'bold', color: '#fff' }
                            },
                            data: data.map(d => ({
                                value: d.count,
                                name: d.severity_name || `Level ${d.value}`,
                                itemStyle: { color: colors[d.value] || '#6b7280' }
                            }))
                        }]
                    });
                },

                updateTimeTrendChart(data) {
                    const sorted = data.slice().sort((a, b) => new Date(a.time) - new Date(b.time));
                    this.charts.timeTrend.setOption({
                        backgroundColor: 'transparent',
                        tooltip: { trigger: 'axis' },
                        legend: { data: ['日志数量'], textStyle: { color: '#9ca3af' } },
                        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                        xAxis: {
                            type: 'category',
                            data: sorted.map(d => d.time.substring(11, 16)),
                            axisLine: { lineStyle: { color: '#4b5563' } },
                            axisLabel: { color: '#9ca3af', fontSize: 10 }
                        },
                        yAxis: {
                            type: 'value',
                            axisLine: { lineStyle: { color: '#4b5563' } },
                            axisLabel: { color: '#9ca3af', fontSize: 10 },
                            splitLine: { lineStyle: { color: '#374151' } }
                        },
                        series: [{
                            name: '日志数量',
                            type: 'line',
                            smooth: true,
                            data: sorted.map(d => d.count),
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(59, 130, 246, 0.5)' },
                                    { offset: 1, color: 'rgba(59, 130, 246, 0.05)' }
                                ])
                            },
                            lineStyle: { color: '#3b82f6', width: 2 },
                            itemStyle: { color: '#3b82f6' }
                        }]
                    });
                },

                getSeverityClass(severity) {
                    const classes = {
                        0: 'bg-red-900 text-red-200',
                        1: 'bg-red-800 text-red-200',
                        2: 'bg-red-700 text-red-200',
                        3: 'bg-red-600 text-red-100',
                        4: 'bg-amber-600 text-amber-100',
                        5: 'bg-blue-600 text-blue-100',
                        6: 'bg-emerald-600 text-emerald-100',
                        7: 'bg-gray-600 text-gray-100',
                    };
                    return classes[severity] || 'bg-gray-600 text-gray-100';
                }
            }
        }
    </script>
</body>
</html>
